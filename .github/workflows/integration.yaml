name: Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-integration:
    name: Integration tests
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        os:
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra jax
      - name: Run integration tests
        run: uv run pytest -v -m "integration" tests/test_mandi_mesolite.py::TestMandiMesoliteSingleRun
        env:
          MESOLITE_MAX_FILES: 1
      - name: Display test summary
        if: always()
        run: |
          echo "Integration tests completed"
