name: CI

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Linting + formating
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: uv pip install -e ".[lint]" --system
      - name: Run linting
        run: |
          ruff format --check
          ruff check

  test-unit:
    name: Unit tests (${{ matrix.backend }})
    strategy:
      matrix:
        python-version: ["3.10"]
        os:
          - ubuntu-latest
        backend:
          - numpy
          - jax
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies (NumPy backend)
        if: matrix.backend == 'numpy'
        run: uv pip install -e ".[test]" --system
      - name: Install dependencies (JAX backend)
        if: matrix.backend == 'jax'
        run: uv pip install -e ".[test,jax]" --system
      - name: Run tests
        run: pytest -v
      - name: Verify backend
        run: python -c "import subhkl; print(f'Backend: {subhkl.OPTIMIZATION_BACKEND}'); assert subhkl.OPTIMIZATION_BACKEND == '${{ matrix.backend }}', f'Expected ${{ matrix.backend }}, got {subhkl.OPTIMIZATION_BACKEND}'"
